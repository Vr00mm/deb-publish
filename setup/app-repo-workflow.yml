name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      artifact-name: ${{ steps.artifact.outputs.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare package metadata
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^Version:.*/Version: $VERSION/" package/DEBIAN/control

      # Adapt this step to your build process
      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags='-s -w' -o package/usr/bin/myapp ./cmd/myapp/

      - name: Build .deb
        id: build
        uses: Vr00mm/deb-publish@v2
        with:
          mode: build
          package-dir: package
          output-path: dist/myapp_amd64.deb

      - name: Compute artifact name
        id: artifact
        run: |
          NAME="deb-${{ steps.build.outputs.package-name }}-${{ steps.build.outputs.package-version }}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.build.outputs.deb-path }}
          retention-days: 1

  publish:
    needs: build
    permissions:
      contents: write
      actions: read
    uses: your-org/your-org.github.io/.github/workflows/publish-deb.yml@master  # Replace with your pages repo
    with:
      source_repo: ${{ github.repository }}
      run_id: ${{ github.run_id }}
      artifact_name: ${{ needs.build.outputs.artifact-name }}
    secrets:
      source_token: ${{ secrets.GITHUB_TOKEN }}
