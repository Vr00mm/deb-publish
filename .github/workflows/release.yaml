name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

      - name: Update floating version tags
        run: |
          MAJOR=$(echo "${GITHUB_REF_NAME}" | cut -d. -f1)
          MINOR=$(echo "${GITHUB_REF_NAME}" | cut -d. -f1-2)
          git tag -f "$MAJOR"
          git tag -f "$MINOR"
          git push origin "$MAJOR" "$MINOR" --force
